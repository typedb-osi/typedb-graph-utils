name: Deploy TypeScript release

on:
  push:
    tags:
      - 'typescript-[0-9]+.[0-9]+.[0-9]+'
      - 'typescript-[0-9]+.[0-9]+.[0-9]+-*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version and tag
        id: resolve
        working-directory: typescript
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          if [[ -z "${FILE_VERSION}" ]]; then
            echo "ERROR: typescript/VERSION is empty." >&2
            exit 1
          fi
          if ! [[ "${FILE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "ERROR: VERSION '${FILE_VERSION}' is not a valid semver." >&2
            exit 1
          fi
          EXPECTED_TAG="typescript-${FILE_VERSION}"
          TAG="${GITHUB_REF_NAME}"
          if [[ "${TAG}" != "${EXPECTED_TAG}" ]]; then
            echo "ERROR: tag '${TAG}' does not match typescript/VERSION ('${FILE_VERSION}')." >&2
            exit 1
          fi

          echo "version=${FILE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify package.json matches VERSION
        working-directory: typescript
        run: node tool/verify-version.js

      - name: Verify version not already on npm
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if npm view "@typedb/graph-utils@${VERSION}" version >/dev/null 2>&1; then
            echo "ERROR: @typedb/graph-utils@${VERSION} is already published to npm." >&2
            exit 1
          fi
          echo "Version '${VERSION}' is not yet on npm."

      - name: Validate RELEASE_NOTES_LATEST.md
        working-directory: typescript
        run: |
          if [[ ! -s RELEASE_NOTES_LATEST.md ]]; then
            echo "ERROR: typescript/RELEASE_NOTES_LATEST.md is missing or empty." >&2
            exit 1
          fi
          echo "Release notes present."

  publish:
    name: Publish release
    needs: validate
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Setup TypeDB
        uses: typedb/setup-typedb@1.0.0
        with:
          typedb_version: 3.7.0
          typedb_args: "--development-mode.enabled=true"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org/'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.12.1 --activate

      - name: Install dependencies
        working-directory: typescript
        run: pnpm install --registry https://registry.npmjs.org/

      - name: Build library
        working-directory: typescript
        run: pnpm run build

      - name: Run tests
        working-directory: typescript/example
        run: pnpm test

      - name: Configure npmjs.org auth
        working-directory: typescript
        env:
          DEPLOY_NPM_TOKEN: ${{ secrets.REPO_NPM_TOKEN }}
        run: |
          cat > .npmrc <<EOF
          registry=https://registry.npmjs.org/
          //registry.npmjs.org/:_authToken=${DEPLOY_NPM_TOKEN}
          EOF

      - name: Publish to npm
        working-directory: typescript
        run: pnpm publish --access public --no-git-checks

      - name: Ensure GitHub Release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "GitHub Release '${TAG}' already exists; leaving as-is."
          else
            gh release create "${TAG}" \
              --title "TypeScript ${VERSION}" \
              --notes-file typescript/RELEASE_NOTES_LATEST.md
          fi
